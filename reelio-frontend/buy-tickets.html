<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Tickets - Reelio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.png" type="image/png">
</head>
<body>
    <header class="sub-header">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Reelio Logo">
            </a>
        </div>
        <span class="page-title">Buy Tickets</span>
    </header>

    <main class="buy-tickets-page">
        <!-- Movie Summary Section -->
        <section class="movie-booking-summary">
            <img id="summaryPoster" alt="Movie Poster" style="max-width:200px; margin-bottom:10px;">
            <h2 id="summaryMovieTitle"></h2>
            <div class="summary-details">
                <p><strong>Location:</strong> <span id="summaryLocation"></span></p>
                <p><strong>Date:</strong> <span id="summaryDate"></span></p>
                <p><strong>Time:</strong> <span id="summaryTime"></span></p>
                <p><strong>Rating:</strong> <span id="summaryRating"></span></p>
            </div>
        </section>

        <!-- Seat Selection Section -->
        <section class="seat-selection-section">
            <h2>Select Your Seats</h2>
            <div class="screen-indicator">Screen</div>
            <div class="seating-chart" id="seatingChart"></div>

            <div class="seat-legend">
                <div class="legend-item"><span class="seat available"></span> Available</div>
                <div class="legend-item"><span class="seat selected"></span> Selected</div>
                <div class="legend-item"><span class="seat occupied"></span> Occupied</div>
            </div>

            <div class="booking-actions">
                <p>Selected Seats: <span id="selectedSeatsDisplay">None</span></p>
                <p>Total Price: ₱<span id="totalPriceDisplay">0.00</span></p>
                <button class="btn-proceed-payment" id="btnProceedToPayment" disabled>Proceed to Payment</button>
            </div>
        </section>
    </main>

    <footer class="sub-footer">
        <nav class="footer-nav">
            <ul>
                <li><a href="#">Terms of Use</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Accessibility</a></li>
                <li><a href="#">Cookies Settings</a></li>
            </ul>
        </nav>
        <p>© 2026 Reelio, All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get the selected booking from localStorage (passed from the previous page)
            const booking = JSON.parse(localStorage.getItem('selectedBooking'));
            const SERVER_URL = 'http://localhost:3000';

            // --- Global Seat Selection Variables ---
            const rows = ['A','B','C','D','E','F','G'];
            const seatsPerRow = 10;
            let selectedSeats = []; 
            let totalPrice = 0;     
            
            // --- Function to update summary displays and button state ---
            function updateBookingSummary() {
                const selectedSeatsDisplay = document.getElementById('selectedSeatsDisplay');
                const totalPriceDisplay = document.getElementById('totalPriceDisplay');
                const btnProceedToPayment = document.getElementById('btnProceedToPayment');
                
                const seatPrice = 350.00; // Price per seat
                totalPrice = selectedSeats.length * seatPrice; 

                selectedSeatsDisplay.textContent = selectedSeats.length > 0 ? selectedSeats.sort().join(', ') : 'None';
                totalPriceDisplay.textContent = totalPrice.toFixed(2);
                btnProceedToPayment.disabled = selectedSeats.length === 0;
            }
            
            function initializeBuyTicketsPage() {
                if (!booking) {
                    document.querySelector('.buy-tickets-page').innerHTML = `
                        <div style="text-align:center; padding:50px;">
                            <h2>No Movie Selected</h2>
                            <p>Please go back to the <a href="index.html">Now Showing</a> page and select a movie.</p>
                            <button onclick="window.location.href='index.html'" style="margin-top:20px;">Back</button>
                        </div>
                    `;
                    return;
                }

                // --- Populate static summary details on the left side ---
                const posterEl = document.getElementById('summaryPoster');
                if (posterEl) {
                    posterEl.src = booking.poster;
                    posterEl.alt = booking.title + " Poster";
                }
                document.getElementById('summaryMovieTitle').textContent = booking.title;
                document.getElementById('summaryLocation').textContent = booking.location;
                
                // Format the YYYY-MM-DD date nicely for display
                let displayDate = booking.date;
                try {
                    const dateObj = new Date(booking.date + 'T00:00:00');
                    if (!isNaN(dateObj)) {
                        displayDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    }
                } catch(e) {}

                document.getElementById('summaryDate').textContent = displayDate; 
                document.getElementById('summaryTime').textContent = booking.time; 
                document.getElementById('summaryRating').textContent = booking.rating;
                document.title = `Book: ${booking.title} | Reelio`;
                
                const seatingChart = document.getElementById('seatingChart');
                
                // --- Seat Interaction & Database Loading Logic ---
                async function loadOccupiedSeats() {
                    seatingChart.innerHTML = '<p style="color:#bbb;">Loading seats...</p>';
                    try {
                        // Ask the server which seats are taken
                        const url = `${SERVER_URL}/api/seats/occupied?movieTitle=${encodeURIComponent(booking.title)}&date=${encodeURIComponent(booking.date)}&time=${encodeURIComponent(booking.time)}&location=${encodeURIComponent(booking.location)}`;
                        
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        let occupiedSeats = [];
                        if (response.ok && data.occupiedSeats) {
                            occupiedSeats = data.occupiedSeats; // If DB is empty, this is correctly []
                        } else {
                            console.warn("Could not retrieve occupied seats. Fallback used.");
                            // If the server actually crashed, put in fake seats so you can still test the UI
                            if (!response.ok) {
                                occupiedSeats = ['A3','A4','B5','C1','C2','D8','D9','G10']; 
                            }
                        }

                        // --- Build the Seating Chart Grid ---
                        seatingChart.innerHTML = ''; 
                        rows.forEach(row => {
                            for(let i=1; i<=seatsPerRow; i++){
                                const seatId = `${row}${i}`;
                                const seat = document.createElement('div');
                                seat.classList.add('seat');
                                seat.textContent = i;
                                seat.dataset.seatId = seatId;

                                if(occupiedSeats.includes(seatId)){
                                    seat.classList.add('occupied');
                                } else {
                                    seat.addEventListener('click', ()=>{
                                        if(seat.classList.contains('selected')){
                                            seat.classList.remove('selected');
                                            selectedSeats = selectedSeats.filter(s=>s!==seatId); 
                                        } else {
                                            if (selectedSeats.length >= 8) {
                                                alert("You can only select a maximum of 8 seats at a time.");
                                                return;
                                            }
                                            seat.classList.add('selected');
                                            selectedSeats.push(seatId);
                                        }
                                        updateBookingSummary(); // Updates the price instantly
                                    });
                                }
                                seatingChart.appendChild(seat);
                            }
                        });

                    } catch (error) {
                        console.error("Error fetching occupied seats:", error);
                        seatingChart.innerHTML = '<p style="color:red;">Error loading seats. Please try again.</p>';
                    }
                    updateBookingSummary(); // Set initial state (0.00)
                }

                // Call the function to build the seats!
                loadOccupiedSeats(); 

                // --- Proceed to Payment Logic ---
                const btnProceedToPayment = document.getElementById('btnProceedToPayment');
                if (btnProceedToPayment) {
                    btnProceedToPayment.addEventListener('click', ()=>{
                        if (selectedSeats.length > 0) {
                            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                            if (!currentUser) {
                                alert('Please sign in to proceed with payment.');
                                openLoginModal();
                                return;
                            }

                            const finalBooking = {
                                ...booking, 
                                selectedSeats: selectedSeats,
                                totalPrice: totalPrice.toFixed(2), 
                                userId: currentUser.email
                            };
                            localStorage.setItem('finalBooking', JSON.stringify(finalBooking));
                            window.location.href = 'payment.html';
                        } else {
                            alert('Please select at least one seat.');
                        }
                    });
                }
            }

            // Start the page!
            initializeBuyTicketsPage(); 
        });
    </script>
</body>
</html>
