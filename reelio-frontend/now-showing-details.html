<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="movieDetailPageTitle">Now Showing Movie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="logo.png" type="image/png">
</head>
<body>
    <header class="sub-header">
        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="R Logo">
            </a>
        </div>
        <span class="page-title" id="detailsPageMovieTitle"></span>
    </header>

    <main class="movie-details-page">
        <section class="movie-info-section">
            <div class="movie-poster">
                <img src="" alt="Movie Poster" id="movieDetailPoster">
            </div>
            <div class="movie-details">
                <h2 id="movieDetailTitle"></h2>
                <p class="rating-duration" id="movieDetailRatingDuration"></p>

                <h3>Overview</h3>
                <p class="overview-text" id="movieDetailOverview"></p>

                <!-- Ticket selection: Location -> Date -> Time (LAYOUT FIXED) -->
                <div class="showtime-selection">
                    <div class="dropdown">
                        <label for="location-select">Cinema</label>
                        <select id="location-select">
                            <option value="Cinema 1">Cinema 1</option>
                            <option value="Cinema 2">Cinema 2</option>
                            <option value="Cinema 3">Cinema 3</option>
                        </select>
                    </div>
                    <div class="dropdown">
                        <label for="date-select">Date</label>
                        <select id="date-select">
                            <option value="">Select Date</option>
                        </select>
                    </div>
                    <div class="dropdown">
                        <label for="time-select">Time</label>
                        <select id="time-select" disabled>
                            <option value="">Select Time</option>
                        </select>
                    </div>
                </div>

                <!-- BUY NOW button at the bottom -->
                <button class="btn-buy-now" id="buyNowButton" style="margin-top: 30px;" disabled>BUY NOW</button>
            </div>
        </section>
    </main>

    <footer class="sub-footer">
        <nav class="footer-nav">
            <ul>
                <li><a href="#">Terms of Use</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Accessibility</a></li>
                <li><a href="#">Cookies Settings</a></li>
            </ul>
        </nav>
        <p>© 2026 Reelio, All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <!-- IN NOW-SHOWING-DETAILS.HTML -->
<script>
    // Get the server URL from admin.js context
    const SERVER_URL = 'http://localhost:3000';
    
    document.addEventListener('DOMContentLoaded', function() {
        // Get movie data from localStorage
        const movie = JSON.parse(localStorage.getItem('nowShowingMovie'));

        // Get the necessary DOM elements
        const timeSelect = document.getElementById('time-select');
        const dateSelect = document.getElementById('date-select');
        const locationSelect = document.getElementById('location-select');
        const buyButton = document.getElementById('buyNowButton');
        const moviePosterEl = document.getElementById('movieDetailPoster');
        const movieTitleEl = document.getElementById('movieDetailTitle');
        const movieRatingEl = document.getElementById('movieDetailRatingDuration');
        const movieOverviewEl = document.getElementById('movieDetailOverview');
        const detailsPageTitleEl = document.getElementById('detailsPageMovieTitle');

        function setButtonState() {
            const isReady = timeSelect.value && dateSelect.value && locationSelect.value;
            buyButton.disabled = !isReady;
            buyButton.style.opacity = isReady ? '1' : '0.6';
            buyButton.style.cursor = isReady ? 'pointer' : 'not-allowed';
        }
        
        function resetSubsequentDropdowns(level) {
            if (level === 'time') {
                timeSelect.innerHTML = '<option value="" disabled selected>Select Time</option>';
                timeSelect.disabled = true;
            }
        }

        // *** NEW HELPER FUNCTION TO FIX AM/PM ISSUE ***
        function convert24hrToAMPM(time24hr) {
    // Input example: "18:30:00" or "18:30"
    const [hoursStr, minutesStr] = time24hr.split(':');
    const h = parseInt(hoursStr, 10);
    const m = minutesStr ? minutesStr.substring(0, 2) : '00'; 

    // Logic check: 
    // If h is 18, period is 'PM'. 
    // If h is 6, period is 'AM'. 
    // If h is 0 (midnight), period is 'AM'.
    const period = h >= 12 ? 'PM' : 'AM';
    
    // Convert 24hr (0-23) to 12hr (1-12) format
    // 0 (midnight) -> 12 AM. 12 (noon) -> 12 PM. 13 -> 1 PM.
    const hours12hr = h % 12 === 0 ? 12 : h % 12;
    
    return `${hours12hr}:${m} ${period}`;
}
        // *** END NEW HELPER FUNCTION ***


        // --- Core Function: Loads available showtimes for the current LOCATION and DATE ---
        async function loadShowtimes() {
            const selectedLocation = locationSelect.value;
            const selectedDate = dateSelect.value;
            
            resetSubsequentDropdowns('time');
            setButtonState(); 

            if (!selectedLocation || !selectedDate) {
                return;
            }
            
            const movieId = movie.movieId; 

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/showtimes/${movieId}`);
                const allShowtimes = await response.json();
                
                if (!response.ok || allShowtimes.length === 0 || allShowtimes.message) {
                    timeSelect.innerHTML = '<option value="" disabled selected>No Showtimes Available</option>';
                    timeSelect.disabled = true;
                    return; 
                }

                const filteredShowtimes = allShowtimes
                    .filter(st => st.show_date === selectedDate && st.location === selectedLocation);

                const availableTimes = filteredShowtimes
                    .map(st => st.show_time) // This is the 24hr format (e.g., "18:30:00")
                    .sort();

                const uniqueTimes = [...new Set(availableTimes)];
                
                if (uniqueTimes.length === 0) {
                    timeSelect.innerHTML = '<option value="" disabled selected>No Showtimes for this Slot</option>';
                    timeSelect.disabled = true;
                } else {
                    uniqueTimes.forEach(time24hr => {
                        // Use the server's display_time for consistency if it exists, otherwise convert it manually
                        const matchingShowtime = filteredShowtimes.find(st => st.show_time === time24hr);
                        // Use the server's calculated display_time if available, otherwise use the new client-side converter
                        const timeText = matchingShowtime && matchingShowtime.display_time ? matchingShowtime.display_time : convert24hrToAMPM(time24hr);
                        
                        timeSelect.innerHTML += `<option value="${time24hr}">${timeText}</option>`; 
                    });
                    timeSelect.disabled = false;
                }

            } catch (error) {
                console.error("Error loading showtimes:", error);
                timeSelect.innerHTML = '<option value="" disabled selected>Error Loading Times</option>';
                timeSelect.disabled = true;
            }
            setButtonState();
        }

        // --- Function to initialize ALL dropdowns (Location & Date) based on ALL available showtimes ---
        async function initializeDropdowns() {
            if (!movie) return;
            
            // 1. Populate Static Details
            if (moviePosterEl) moviePosterEl.src = movie.poster;
            if (moviePosterEl) moviePosterEl.alt = movie.title + " Movie Poster";
            detailsPageTitleEl.textContent = movie.title;
            movieTitleEl.textContent = movie.title;
            movieRatingEl.textContent = movie.rating;
            movieOverviewEl.textContent = movie.overview;
            document.title = movie.title + " | Reelio";

            const movieId = movie.movieId; 
            
            // Reset dropdowns to default states
            locationSelect.innerHTML = '<option value="" disabled selected>Select Cinema</option>';
            dateSelect.innerHTML = '<option value="" disabled selected>Select Date</option>';
            timeSelect.innerHTML = '<option value="" disabled selected>Select Time</option>';
            timeSelect.disabled = true; 
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/showtimes/${movieId}`); 
                const showtimes = await response.json();
                
                if (!response.ok || showtimes.length === 0 || showtimes.message) {
                    locationSelect.innerHTML = '<option value="" disabled selected>No Showtimes Available</option>';
                    dateSelect.innerHTML = '<option value="" disabled selected>No Showtimes Available</option>';
                    return; 
                }

                // Extract unique dates and locations
                const uniqueDates = [...new Set(showtimes.map(st => st.show_date))].sort(); 
                const uniqueLocations = [...new Set(showtimes.map(st => st.location))].sort(); 

                // 1. Populate LOCATION Dropdown (ALWAYS a dropdown now)
                uniqueLocations.forEach(locationString => {
                    locationSelect.innerHTML += `<option value="${locationString}">${locationString}</option>`;
                });
                
                // 2. Populate DATE Dropdown (Always a dropdown)
                uniqueDates.forEach(dateString => {
                    let readableDate = dateString;
                    try {
                        const dateObj = new Date(dateString + 'T00:00:00');
                        if (!isNaN(dateObj)) {
                            readableDate = dateObj.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
                        }
                    } catch (e) { /* ignore parsing error */ }
                    dateSelect.innerHTML += `<option value="${dateString}">${readableDate}</option>`;
                });

                // Set default selection to start the dependency chain
                if (uniqueLocations.length > 0) {
                    locationSelect.value = uniqueLocations[0];
                }
                if (uniqueDates.length > 0) {
                    dateSelect.value = uniqueDates[0];
                }

            } catch (error) {
                console.error("Error fetching showtimes for initialization:", error);
                locationSelect.innerHTML = '<option value="" disabled selected>Error Loading Cinemas</option>';
                dateSelect.innerHTML = '<option value="" disabled selected>Error Loading Dates</option>';
            }
            
            // Attach event listeners
            locationSelect.addEventListener('change', loadShowtimes); 
            dateSelect.addEventListener('change', loadShowtimes); 
            timeSelect.addEventListener('change', setButtonState); 
            
            // Kick off the first time-loading based on the default date/location selected above
            loadShowtimes(); 
        }
        
        // KICK OFF THE INITIALIZATION
        initializeDropdowns();

        // Handle BUY NOW click
        buyButton.addEventListener('click', () => {
            const selectedTime = timeSelect.value; 
            const selectedDate = dateSelect.value;
            const selectedLocation = locationSelect.value;
            
            if (!selectedTime || !selectedDate || !selectedLocation) {
                alert('Please select a Cinema, Date, and Time before proceeding.');
                return;
            }

            // *** FIX APPLIED HERE: Use the CONVERTED time to store, but keep the 24hr time in the 'time' property for server query matching ***
            const bookingDetails = {
                title: movie.title,
                poster: movie.poster,
                rating: movie.rating,
                location: selectedLocation, 
                date: selectedDate,         
                time: selectedTime, // Keep 24hr format (e.g., "18:30:00") for server matching
                // The display name for this booking will be determined by the client that reads it (like buy-tickets.html)
            };
            localStorage.setItem('selectedBooking', JSON.stringify(bookingDetails)); 
            window.location.href = "buy-tickets.html";
        });
    });
</script>
</body>
</html>```
